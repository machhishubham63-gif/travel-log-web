<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <link rel="manifest" href="/manifest.json?v=6" />
    <meta name="theme-color" content="#000000" id="theme-color-meta" />
    
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <title>Travel Log</title>

    <style>
      :root {
        /* 🌙 DARK THEME (Default) */
        --bg-main: #000000;
        --bg-card: #111111;
        --bg-surface: #1A1A1A;
        --bg-input: #0A0A0A;
        --text-main: #ffffff;
        --text-muted: #888888;
        --text-faded: #666666;
        --border-light: #222222;
        --border-strong: #333333;
        
        /* Accents */
        --accent-blue: #448aff;
        --accent-blue-bg: #448aff15;
        --accent-green: #69f0ae;
        --accent-green-bg: #69f0ae15;
        --accent-red: #ff5252;
        --accent-red-bg: #ff525215;
        --accent-purple: #b388ff;
        --accent-yellow: #ffd740;
      }

      [data-theme="light"] {
        /* ☀️ LIGHT THEME */
        --bg-main: #f3f4f6;
        --bg-card: #ffffff;
        --bg-surface: #f9fafb;
        --bg-input: #f3f4f6;
        --text-main: #111827;
        --text-muted: #6b7280;
        --text-faded: #9ca3af;
        --border-light: #e5e7eb;
        --border-strong: #d1d5db;
        
        /* Accents (Darker for readability on white) */
        --accent-blue: #2563eb;
        --accent-blue-bg: #eff6ff;
        --accent-green: #059669;
        --accent-green-bg: #ecfdf5;
        --accent-red: #dc2626;
        --accent-red-bg: #fef2f2;
        --accent-purple: #7c3aed;
        --accent-yellow: #d97706;
      }

      html, body {
        margin: 0 !important;
        padding: 0 !important;
        background-color: var(--bg-main) !important;
        color: var(--text-main);
        width: 100vw;
        min-height: 100vh;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
    </style>
    
    <script>
      const savedTheme = localStorage.getItem('app-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
      document.getElementById('theme-color-meta').setAttribute('content', savedTheme === 'light' ? '#f3f4f6' : '#000000');
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js?v=6');
        });
      }
    </script>
  </body>
</html>
